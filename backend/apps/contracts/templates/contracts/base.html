<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "DejaVu Sans", Arial, sans-serif;
      font-size: 12pt;
      line-height: 1.6;
      color: #000;
    }

    .page {
      padding: 2cm 2.5cm;
    }

    h1 {
      font-size: 14pt;
      font-weight: bold;
      text-align: center;
      margin-bottom: 8pt;
    }

    h2 {
      font-size: 12pt;
      font-weight: bold;
      margin-top: 16pt;
      margin-bottom: 8pt;
    }

    p {
      margin-bottom: 8pt;
      text-align: justify;
    }

    .center {
      text-align: center;
    }

    .meta {
      text-align: right;
      margin-bottom: 16pt;
      font-size: 11pt;
      color: #444;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 12pt;
    }

    table td {
      padding: 6pt 8pt;
      border: 1px solid #ccc;
      font-size: 11pt;
    }

    table td:first-child {
      width: 45%;
      color: #444;
    }

    .signatures {
      margin-top: 32pt;
      display: flex;
      justify-content: space-between;
      gap: 32pt;
    }

    .signature-block {
      flex: 1;
    }

    .signature-block p {
      margin-bottom: 4pt;
    }

    .signature-line {
      border-bottom: 1px solid #000;
      height: 20pt;
      margin-bottom: 4pt;
    }

    .sign-stamp {
      margin-top: 24pt;
      padding: 12pt;
      border: 1px solid #ccc;
      font-size: 10pt;
      color: #444;
    }

    .sign-stamp p {
      margin-bottom: 2pt;
    }
  </style>
</head>
<body>
  <div class="page">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
