services:
  db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    expose:
      - "8000"
    volumes:
      - ./backend/apps:/app/apps
      - ./backend/config:/app/config
      - ./backend/manage.py:/app/manage.py
      - media_files:/app/media
      - static_files:/app/staticfiles

  celery:
    build: ./backend
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/apps:/app/apps
      - ./backend/config:/app/config
      - ./backend/manage.py:/app/manage.py
      - media_files:/app/media
    command: uv run celery -A config worker -l info --uid=nobody
  frontend:
    build: ./frontend
    restart: always
    env_file:
      - ./frontend/.env
    expose:
      - "3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      # - "443:443"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
      # - ./nginx/logs:/var/log/nginx

volumes:
  postgres_data:
  media_files:
  static_files:
