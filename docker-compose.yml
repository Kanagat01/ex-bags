services:
  db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend/apps:/app/apps
      - ./backend/config:/app/config
      - ./backend/manage.py:/app/manage.py
      - media_files:/app/media
    command: uv run python manage.py runserver 0.0.0.0:8000

  celery:
    build: ./backend
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/apps:/app/apps
      - ./backend/config:/app/config
      - ./backend/manage.py:/app/manage.py
    command: uv run celery -A config worker -l info    
  frontend:
    build: ./frontend
    restart: always
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  media_files: